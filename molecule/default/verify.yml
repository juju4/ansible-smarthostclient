---
- name: Verify
  hosts: smarthost
  pre_tasks:
    - name: RedHat | Ensure pgrep is present
      ansible.builtin.package:
        name: procps-ng
        state: present
      when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int >= 8
    - name: Debian | Ensure pgrep is present
      ansible.builtin.package:
        name: procps
        state: present
      when: ansible_facts['os_family'] == "Debian"
  tasks:
    - name: Ensure process is running
      ansible.builtin.command: pgrep -u root master
      register: ps
      changed_when: false
      ignore_errors: true
    - name: Validate ps output
      ansible.builtin.assert:
        that: ps.stdout | length > 0
      when: >
        not (
          ansible_facts['os_family'] == "RedHat" and ansible_facts['virtualization_type'] is defined and (
            ansible_facts['virtualization_type'] == "docker"
            or ansible_facts['virtualization_type'] == "containerd"
            or ansible_facts['virtualization_type'] == "container"
          )
        )

    - name: Fetch content of /etc/postfix/smarthost_passwd
      ansible.builtin.slurp:
        src: /etc/postfix/smarthost_passwd
      register: passfile
    - name: Validate /etc/postfix/smarthost_passwd
      ansible.builtin.assert:
        that:
          - "'login:pass' in passfile['content'] | b64decode"

    - name: Fetch content of /etc/postfix/main.cf
      ansible.builtin.slurp:
        src: /etc/postfix/main.cf
      register: cfg
    - name: Validate /etc/postfix/main.cf
      ansible.builtin.assert:
        that:
          - "'relayhost = [smtp.gmail.com]:587' in cfg['content'] | b64decode"
